services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dealexceptions
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_dev_pw
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d dealexceptions"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-migrate:
    build:
      context: ./backend
      dockerfile: DealExceptions.Database.DbUp/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionString: "Host=db;Database=dealexceptions;Username=app;Password=app_dev_pw"
    restart: on-failure

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Database=dealexceptions;Username=app;Password=app_dev_pw"
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
