services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "Dev@123456!"
      ACCEPT_EULA: "Y"
      MSSQL_DB: dealexceptions
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Dev@123456!" -No -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  db-migrate:
    build:
      context: ./backend
      dockerfile: DealExceptions.Database.DbUp/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=dealexceptions;User Id=sa;Password=Dev@123456!;TrustServerCertificate=True;"
    restart: on-failure

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    environment:
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=dealexceptions;User Id=sa;Password=Dev@123456!;TrustServerCertificate=True;"
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  sqldata:
